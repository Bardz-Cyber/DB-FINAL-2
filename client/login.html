<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheckList - Admin Login</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000080; /* Fallback */
            min-height: 100vh;
            margin: 0;
            display: flex;
        }
        .split-left {
            flex: 1;
            background-image: url('assets/images/UC-Banner.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .split-left::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 128, 0.4); /* Navy blue overlay */
        }
        .split-right {
            flex: 1;
            background-color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .split-left { min-height: 30vh; }
            .split-right { min-height: 70vh; }
        }
    </style>
</head>
<body>
    <div class="split-left"></div>

    <div class="split-right">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
            <div class="p-8 text-center bg-blue-50 border-b border-blue-100">
                <div class="inline-flex items-center justify-center mb-2">
                    <img src="assets/images/UC-logo.png" alt="UC Logo" class="h-24 w-auto">
                </div>
                <h1 class="text-3xl font-bold text-gray-800 mt-2">CheckList</h1>
                <p class="text-gray-500 mt-2">Inventory Management System</p>
                <span class="inline-block mt-3 px-3 py-1 bg-blue-100 text-blue-800 rounded-full text-xs font-semibold tracking-wide uppercase">Admin Portal</span>
            </div>

            <div class="p-8">
                <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Sign In</h2>

                <div id="alertMessage" class="hidden mb-4 p-3 rounded text-sm text-center"></div>

                <form id="loginForm" class="space-y-5">
                    <div>
                        <label for="admin_id" class="block text-sm font-medium text-gray-700 mb-1">Admin ID</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-id-card text-gray-400"></i>
                            </div>
                            <input type="text" id="admin_id" name="admin_id" required
                                class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-800 focus:border-blue-800 transition-colors"
                                placeholder="Admin ID">
                        </div>
                    </div>

                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fa-solid fa-lock text-gray-400"></i>
                            </div>
                            <input type="password" id="password" name="password" required
                                class="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-800 focus:border-blue-800 transition-colors"
                                placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="w-full bg-blue-800 hover:bg-blue-900 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-md hover:shadow-lg focus:outline-none focus:ring-2 focus:ring-blue-800 focus:ring-offset-2 flex justify-center items-center mt-6">
                        <span id="btnText">Sign In</span>
                        <i id="btnSpinner" class="fa-solid fa-spinner fa-spin hidden ml-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
